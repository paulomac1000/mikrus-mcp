name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check formatting with Ruff
        run: ruff format --check src/ tests/

      - name: Lint with Ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: mypy src/

      - name: Security scan with bandit
        run: bandit -r src/ -f json -o bandit-report.json || true

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Validate documentation (AFDS)
        run: |
          python scripts/docs_validate.py --config afds_config.yaml --strict --baseline .afds-baseline.json ./

      - name: Test with pytest
        run: pytest tests/ -v

  docker-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (prod)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: prod
          push: false
          tags: mikrus-mcp:test

      - name: Build Docker image (dev)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: dev
          push: false
          tags: mikrus-mcp:dev

      - name: Docker smoke test
        run: |
          docker run -d --rm --network host \
            -e MCP_REST_PORT=8301 \
            -e MCP_PORT=8300 \
            -e MIKRUS_API_KEY=test \
            -e MIKRUS_SERVER_NAME=test \
            --name test-srv mikrus-mcp:test
          sleep 5
          curl -fsS --retry 5 --retry-delay 2 http://127.0.0.1:8301/api/health || exit 1
          TOOLS=$(curl -s http://127.0.0.1:8301/api/tools | python3 -c "import sys,json; print(json.load(sys.stdin)['data'].__len__())")
          [ "$TOOLS" -ge "10" ] || (echo "Expected >=10 tools, got $TOOLS" && exit 1)
          docker stop test-srv
