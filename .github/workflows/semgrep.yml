name: Semgrep Security Scan

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  push:
    branches: [main]

concurrency:
  group: semgrep-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write
      actions: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Semgrep Scan
        id: semgrep
        uses: semgrep/semgrep-action@v1
        env:
          SEMGREP_RULES: p/auto p/secrets p/owasp-top-ten
        with:
          config: >-
            p/auto
            p/secrets
            p/owasp-top-ten

      - name: Upload SARIF to GitHub Security
        id: upload-sarif
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Warn if SARIF upload failed
        if: always() && steps.upload-sarif.outcome == 'failure'
        run: echo "::warning::SARIF upload failed — check codeql-action reference or permissions"

      - name: Post or update PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          SEMGREP_EXIT_CODE: ${{ steps.semgrep.outcome }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- semgrep-bot -->';
            const exitCode = process.env.SEMGREP_EXIT_CODE;
            const prNumber = context.issue.number;

            const body = exitCode === 'success'
              ? `${marker}\n## ✅ Semgrep Security Scan — Passed\n\nNo security issues or dangerous patterns found.\n\n*Ran: p/auto + p/secrets + p/owasp-top-ten*`
              : `${marker}\n## ❌ Semgrep Security Scan — Failed\n\n**Semgrep found security issues or dangerous patterns.**\n\nSee the **Security** tab or PR diff for annotations.\n\n*Ran: p/auto + p/secrets + p/owasp-top-ten*\n\n**This is a blocking check — fix before merging.**`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100
            });
            const existing = comments.data.find(
              c => c.user.login === 'github-actions[bot]' && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
