services:
  mikrus-mcp-dev:
    build:
      context: .
      target: prod
    env_file: .env
    stdin_open: true
    tty: true
    command: mikrus-mcp
    ports:
      - "8300:8300"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    # Mount SSH keys read-only if needed (uncomment and adjust path)
    # volumes:
    #   - ${HOME}/.ssh/id_ed25519:/home/appuser/.ssh/id_ed25519:ro

  test:
    build:
      context: .
      target: dev
    command: pytest tests/ -v
    profiles:
      - test
